apiVersion: v1
kind: Service
metadata:
  name: {{ include "async-ai.fullname" . }}-api
  labels:
    {{- include "async-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.api.service.type | default "ClusterIP" }}
  selector:
    {{- include "async-ai.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: {{ .Values.api.service.port | default 80 }}
      targetPort: {{ .Values.api.service.targetPort | default 8000 }}
      protocol: TCP