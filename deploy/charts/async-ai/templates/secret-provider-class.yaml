apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ .Release.Name }}-kv
  namespace: {{ .Release.Namespace }}
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: {{ .Values.worker.secretProvider.clientId | quote }}
    keyvaultName: {{ .Values.worker.secretProvider.kvName | quote }}
    tenantId: {{ .Values.worker.secretProvider.tenantId | quote }}
    # Importante para Workload Identity:
    userAssignedIdentityID: {{ .Values.worker.secretProvider.clientId | quote }} 
    objects: |
      array:
        {{- range .Values.worker.secretProvider.secrets }}
        - |
          objectName: {{ . | quote }}
          objectType: secret
          objectVersion: ""
        {{- end }}
  secretObjects:
    - secretName: {{ include "async-ai.secretName" . | quote }}
      type: Opaque
      data:
        - objectName: openai-api-key
          key: OPENAI_API_KEY
        - objectName: rabbitmq-password
          key: RABBITMQ_PASSWORD
        - objectName: rabbitmq-connection
          key: rabbitmq-connection