apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.worker.serviceAccountName | default (printf "%s-worker" .Release.Name) }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
    app.kubernetes.io/component: worker
  annotations:
    # Vincula o Pod à identidade gerenciada da Azure
    azure.workload.identity/client-id: {{ .Values.worker.secretProvider.clientId | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-worker
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicaCount | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Release.Name }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Release.Name }}
        app.kubernetes.io/component: worker
        # CRÍTICO: Ativa a injeção de tokens do Workload Identity
        azure.workload.identity/use: "true"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      serviceAccountName: {{ .Values.worker.serviceAccountName | default (printf "%s-worker" .Release.Name) }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: worker
          image: "{{ .Values.image.workerRepository }}:{{ .Values.image.tag | default "latest" }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "Always" }}
          env:
            - name: RABBITMQ_CONNECTION
              valueFrom:
                secretKeyRef:
                  name: {{ include "async-ai.secretName" . }}
                  key: rabbitmq-connection
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "async-ai.secretName" . }}
                  key: RABBITMQ_PASSWORD
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "async-ai.secretName" . }}
                  key: OPENAI_API_KEY
            - name: QUEUE_NAME
              value: {{ .Values.worker.queue.name | quote }}
            - name: RESULT_QUEUE
              value: {{ .Values.worker.queue.result | quote }}
            - name: MODEL_NAME
              value: {{ .Values.worker.env.model | quote }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          volumeMounts:
            - name: kv-secrets
              mountPath: {{ .Values.worker.volumeMountPath | default "/mnt/secrets-store" | quote }}
              readOnly: true
          livenessProbe:
            exec:
              command: ["bash", "-c", "celery -A worker.app inspect ping -d celery@$(hostname) -t 5"]
            initialDelaySeconds: 20
            periodSeconds: 30
          readinessProbe:
            exec:
              command: ["bash", "-c", "celery -A worker.app inspect ping -d celery@$(hostname) -t 5"]
            initialDelaySeconds: 15
            periodSeconds: 30
      volumes:
        - name: kv-secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ .Release.Name }}-kv